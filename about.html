   <script>
document.addEventListener('keydown', function(e) {

    // Block Ctrl+U (View Source)
    if (e.ctrlKey && e.key.toLowerCase() === 'u') {
        e.preventDefault();
        return false;
    }

    // Block F12
    if (e.key === 'F12') {
        e.preventDefault();
        return false;
    }

    // Block Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+Shift+C
    if (e.ctrlKey && e.shiftKey &&
        ['i', 'j', 'c'].includes(e.key.toLowerCase())) {
        e.preventDefault();
        return false;
    }
});
</script>

    <canvas id="Matrix" class="matrix-canvas" aria-hidden="true"></canvas>
    <script>
        (() => {
            const canvas = document.getElementById("Matrix");
            if (!canvas) return;

            const context = canvas.getContext("2d");
            if (!context) return;

            const prefersReducedMotion = window.matchMedia
                ? window.matchMedia("(prefers-reduced-motion: reduce)")
                : null;
            if (prefersReducedMotion?.matches) return;

            const katakana =
                "";
            const latin = "SHAFEEQAHAMED M";
            const nums = "+91 8489481039";
            const alphabet = katakana + latin + nums;

            const fontSize = 16;
            let columns = 0;
            let rainDrops = [];

            let rafId = 0;
            let running = false;
            let lastFrameMs = 0;
            const frameIntervalMs = 33; // ~30fps

            const resizeCanvas = () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                columns = Math.floor(canvas.width / fontSize);
                rainDrops = new Array(columns).fill(1);
            };

            const draw = (now) => {
                if (!running) return;
                rafId = requestAnimationFrame(draw);
                if (now - lastFrameMs < frameIntervalMs) return;
                lastFrameMs = now;

                context.fillStyle = "rgba(0, 0, 0, 0.05)";
                context.fillRect(0, 0, canvas.width, canvas.height);

                context.fillStyle = "rgb(241, 239, 247)";
                context.font = `${fontSize}px monospace`;

                for (let i = 0; i < rainDrops.length; i += 1) {
                    const text = alphabet.charAt((Math.random() * alphabet.length) | 0);
                    context.fillText(text, i * fontSize, rainDrops[i] * fontSize);

                    if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                        rainDrops[i] = 0;
                    }
                    rainDrops[i] += 1;
                }
            };

            const start = () => {
                if (running) return;
                if (document.hidden) return;
                if (prefersReducedMotion?.matches) return;
                running = true;
                lastFrameMs = performance.now();
                rafId = requestAnimationFrame(draw);
            };

            const stop = () => {
                running = false;
                if (rafId) cancelAnimationFrame(rafId);
                rafId = 0;
            };

            resizeCanvas();
            window.addEventListener("resize", resizeCanvas, { passive: true });
            document.addEventListener("visibilitychange", () => {
                if (document.hidden) stop();
                else start();
            });

            if (prefersReducedMotion) {
                const handler = () => {
                    if (prefersReducedMotion.matches) stop();
                    else start();
                };
                if (typeof prefersReducedMotion.addEventListener === "function") {
                    prefersReducedMotion.addEventListener("change", handler);
                } else if (typeof prefersReducedMotion.addListener === "function") {
                    prefersReducedMotion.addListener(handler);
                }
            }

            if ("requestIdleCallback" in window) {
                requestIdleCallback(start, { timeout: 1500 });
            } else {
                setTimeout(start, 0);
            }
        })();
    </script>
