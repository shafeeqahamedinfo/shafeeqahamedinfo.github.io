<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Admin login for portfolio content management" />
    <title>Admin Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style"
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
        onload="this.onload=null;this.rel='stylesheet'" />
    <noscript>
        <link rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" />
    </noscript>
    <link rel="stylesheet" href="assets/css/styles.css" />
</head>

<body>
    <header class="site-header">
        <div class="container">
            <nav class="main-nav">
                <a class="brand" href="index.html">My Portfolio</a>
                <div class="nav-links">
                    <a href="index.html">Back to Site</a>
                </div>
            </nav>
        </div>
    </header>

    <main class="auth-layout">
        <section class="auth-card">
            <h1>Admin Login</h1>
            <p class="section-intro">Sign in with admin email/password, or create the first admin account from this
                page.</p>

            <form id="adminLoginForm" novalidate>
                <div class="input-wrap">
                    <label for="adminEmail">Email</label>
                    <input id="adminEmail" name="email" type="email" required />
                </div>

                <div class="input-wrap">
                    <label for="adminPassword">Password</label>
                    <input id="adminPassword" name="password" type="password" required />
                </div>

                <div class="hero-actions">
                    <button class="btn btn-primary" type="submit">Login</button>
                    <button id="createAdminBtn" class="btn btn-secondary" type="button">Create Admin Account</button>
                </div>
                <p class="section-intro" style="margin: 0.65rem 0 0; font-size: 0.9rem;">
                    Use this only once. After creating your account, disable public sign-ups in Supabase Auth settings.
                </p>
                <p id="authStatus" class="status" aria-live="polite"></p>
            </form>
        </section>
    </main>

    <script type="module" src="assets/js/admin-login.js"></script>
</body>

</html>
