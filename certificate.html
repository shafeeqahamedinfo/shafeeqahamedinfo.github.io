<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Certificate details page" />
    <title>Certificate Details</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style"
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
        onload="this.onload=null;this.rel='stylesheet'" />
    <noscript>
        <link rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" />
    </noscript>
    <link rel="stylesheet" href="assets/css/styles.css" />
</head>

<body>
    <header class="site-header">
        <div class="container">
            <nav class="main-nav">
                <a class="brand" href="index.html">My Portfolio</a>
                <div class="nav-links">
                    <a href="index.html#certificates">Back to Certificates</a>
                </div>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="page-header">
            <h1 id="certificateTitle">Certificate Details</h1>
            <p id="certificateSummary">Detailed certificate description and metadata.</p>
        </section>

        <section class="details-layout">
            <article class="details-card">
                <img id="certificateImage" src="assets/images/certificate-placeholder.svg" loading="lazy"
                    alt="Certificate image" />

            </article>

            <article class="details-card">
                <h2>Info</h2>
                <p><strong>Issued By:</strong> <span id="issuedBy">-</span></p>
                <p><strong>Issued On:</strong> <span id="issuedOn">-</span></p>
                <h2>Description</h2>
                <p id="certificateDescription">Description appears here.</p>
                <p>
                    <a id="certificateLink" class="btn btn-secondary" href="#" target="_blank"
                        rel="noopener noreferrer">
                        View Certificate Link
                    </a>
                </p>
            </article>
        </section>
    </main>

    <script type="module" src="assets/js/certificate-details.js"></script>
</body>

</html>
