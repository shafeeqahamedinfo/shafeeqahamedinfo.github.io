<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Project details page" />
    <title>Project Details</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style"
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
        onload="this.onload=null;this.rel='stylesheet'" />
    <noscript>
        <link rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" />
    </noscript>
    <link rel="stylesheet" href="assets/css/styles.css" />
</head>

<body>
    <header class="site-header">
        <div class="container">
            <nav class="main-nav">
                <a class="brand" href="index.html">My Portfolio</a>
                <div class="nav-links">
                    <a href="index.html#projects">Back to Projects</a>
                </div>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="page-header">
            <h1 id="projectTitle">Project Details</h1>
            <p id="projectSummary">Complete details about this project.</p>
        </section>

        <section class="details-layout">
            <article class="details-card">
                <div class="slider" id="projectSlider">
                    <div class="slider-track" id="sliderTrack"></div>
                </div>
                <div class="slider-nav">
                    <button id="prevSlide" type="button">Previous</button>
                    <button id="nextSlide" type="button">Next</button>
                </div>
            </article>

            <article class="details-card">
                <h2>Description</h2>
                <p id="projectDescription">Description appears here.</p>
                <h2>Tech Stack</h2>
                <div id="projectTech" class="badge-list"></div>
                <h2>Links</h2>
                <div class="project-links">
                    <a id="liveDemo" class="btn btn-secondary" href="#" rel="noopener noreferrer">Live Demo</a>
                    <a id="githubRepo" class="btn btn-secondary" href="#" rel="noopener noreferrer">GitHub
                        Repository</a>
                </div>
            </article>
        </section>
    </main>

    <script type="module" src="assets/js/project-details.js"></script>
</body>

</html>
