<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Skill details page" />
    <title>Skill Details</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style"
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
        onload="this.onload=null;this.rel='stylesheet'" />
    <noscript>
        <link rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" />
    </noscript>
    <link rel="stylesheet" href="assets/css/styles.css" />
</head>

<body>
    <header class="site-header">
        <div class="container">
            <nav class="main-nav">
                <a class="brand" href="index.html">My Portfolio</a>
                <div class="nav-links">
                    <a href="index.html#skills">Back to Skills</a>
                </div>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="page-header">
            <h1 id="skillTitle">Skill Details</h1>
            <p id="skillPercent">Knowledge: 0%</p>
        </section>

        <section class="details-layout">
            <article class="details-card">
                <img id="skillImage" src="assets/images/project-placeholder.svg" loading="lazy" alt="Skill image" />
            </article>

            <article class="details-card">
                <h2>Summary</h2>
                <p id="skillSummaryText" class="section-intro">Summary appears here.</p>

                <h2>Details</h2>
                <p id="skillDetailsText">Details appear here.</p>

                <h2>Tools</h2>
                <div id="skillTools" class="badge-list"></div>

                <h2>Related Projects</h2>
                <div id="relatedProjects" class="project-links"></div>
            </article>
        </section>
    </main>

    <script type="module" src="assets/js/skill-details.js"></script>
</body>

</html>
